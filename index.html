<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LailaBelajar</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{--bg:#070707;--fg:#f0ece2;--muted:#6b6560;--accent:#d4af37;--card:rgba(16,16,16,0.8);--border:rgba(212,175,55,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:system-ui,sans-serif;color:var(--fg);overflow:hidden}
.enter-overlay{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:opacity .7s ease,transform .7s ease}
.enter-overlay.gone{opacity:0;transform:scale(1.08);pointer-events:none}
.enter-ring{width:100px;height:100px;border-radius:50%;border:1.5px solid rgba(212,175,55,0.25);display:flex;align-items:center;justify-content:center;position:relative;animation:enterPulse 2.5s ease-in-out infinite}
.enter-ring::before{content:'';position:absolute;inset:-12px;border-radius:50%;border:1px solid rgba(212,175,55,0.08);animation:enterPulse 2.5s ease-in-out infinite .4s}
.enter-ring::after{content:'';position:absolute;inset:-24px;border-radius:50%;border:1px solid rgba(212,175,55,0.04);animation:enterPulse 2.5s ease-in-out infinite .8s}
@keyframes enterPulse{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.06);opacity:1}}
.enter-ring i{font-size:32px;color:var(--accent);animation:iconBreath 3s ease-in-out infinite}
@keyframes iconBreath{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.enter-brand{font-weight:900;font-size:42px;margin-top:32px;background:linear-gradient(135deg,var(--accent) 0%,#f5e6a3 50%,var(--accent) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s ease-in-out infinite}
@keyframes shimmer{0%,100%{background-position:0% center}50%{background-position:200% center}}
.enter-hint{margin-top:20px;font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;font-weight:300;animation:hintBlink 2.5s ease-in-out infinite}
@keyframes hintBlink{0%,100%{opacity:.3}50%{opacity:.8}}
.bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-layer .glow{position:absolute;border-radius:50%;filter:blur(100px);animation:drift 14s ease-in-out infinite}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(25px,-18px) scale(1.06)}66%{transform:translate(-18px,22px) scale(0.94)}}
.glow.a{width:350px;height:350px;background:rgba(212,175,55,0.07);top:20%;left:25%}
.glow.b{width:280px;height:280px;background:rgba(190,150,30,0.05);bottom:20%;right:20%;animation-delay:-5s;animation-duration:18s}
.glow.c{width:200px;height:200px;background:rgba(212,175,55,0.04);top:60%;left:55%;animation-delay:-9s;animation-duration:20s}
canvas#particles{position:fixed;inset:0;z-index:1;pointer-events:none}
.vline{position:fixed;left:50%;width:1px;transform:translateX(-50%);z-index:1;pointer-events:none}
.vline.top{top:0;height:100px;background:linear-gradient(to bottom,transparent,rgba(212,175,55,0.25),transparent);animation:linePulse 5s ease-in-out infinite}
.vline.bottom{bottom:0;height:100px;background:linear-gradient(to top,transparent,rgba(212,175,55,0.25),transparent);animation:linePulse 5s ease-in-out infinite 2.5s}
@keyframes linePulse{0%,100%{opacity:.15}50%{opacity:.5}}
.container{position:relative;z-index:10;text-align:center;opacity:0;transform:translateY(28px) scale(.97);filter:blur(5px);transition:all .9s cubic-bezier(.16,1,.3,1)}
.container.visible{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
.icon-ring{width:60px;height:60px;margin:0 auto 28px;display:flex;align-items:center;justify-content:center;border-radius:18px;background:linear-gradient(135deg,rgba(212,175,55,0.14),rgba(212,175,55,0.04));border:1px solid rgba(212,175,55,0.18);animation:ringPulse 3.5s ease-in-out infinite}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 rgba(212,175,55,0.12)}50%{box-shadow:0 0 24px 6px rgba(212,175,55,0.08)}}
.icon-ring i{font-size:22px;color:var(--accent)}
.brand{font-weight:900;font-size:36px;letter-spacing:-.5px;margin-bottom:8px;background:linear-gradient(135deg,var(--accent) 0%,#f5e6a3 45%,var(--accent) 100%);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 5s ease-in-out infinite}
.tagline{font-size:13px;color:var(--muted);font-weight:300;margin-bottom:40px}
.pw-card{position:relative;width:320px;margin:0 auto;padding:28px;background:var(--card);border:1px solid var(--border);border-radius:18px;backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);box-shadow:0 20px 50px -12px rgba(0,0,0,0.5),0 0 60px -15px rgba(212,175,55,0.12);overflow:hidden}
.pw-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:14px;font-weight:500}
.pw-display{display:flex;align-items:center;justify-content:center;gap:6px;padding:14px 0;margin-bottom:20px}
.pw-char{font-family:monospace;font-size:26px;font-weight:600;color:var(--accent);display:inline-block;opacity:0;transform:translateY(12px) scale(.8);transition:opacity .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1)}
.pw-char.show{opacity:1;transform:translateY(0) scale(1);animation:sway 2.2s ease-in-out infinite}
@keyframes sway{0%,100%{transform:translateY(0) rotate(0deg) scale(1)}25%{transform:translateY(-4px) rotate(-4deg) scale(1.04)}50%{transform:translateY(-2px) rotate(3deg) scale(1.02)}75%{transform:translateY(-3px) rotate(-2deg) scale(1.03)}}
.divider{height:1px;background:linear-gradient(to right,transparent,rgba(212,175,55,0.15),transparent);margin-bottom:18px}
.copy-btn{display:inline-flex;align-items:center;gap:10px;padding:11px 28px;background:rgba(212,175,55,0.08);border:1px solid rgba(212,175,55,0.18);border-radius:10px;color:var(--accent);font-size:13px;font-weight:500;cursor:pointer;transition:all .3s ease}
.copy-btn:hover{border-color:rgba(212,175,55,0.35);transform:translateY(-1px);box-shadow:0 6px 24px -6px rgba(212,175,55,0.2)}
.copy-btn.copied{border-color:rgba(80,200,120,0.3);color:#50c878}
.footer{margin-top:32px;font-size:11px;color:rgba(255,255,255,0.12)}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(14,14,14,0.95);border:1px solid rgba(212,175,55,0.2);color:var(--fg);padding:11px 22px;border-radius:11px;font-size:13px;backdrop-filter:blur(16px);box-shadow:0 8px 30px rgba(0,0,0,0.5);opacity:0;transition:all .4s cubic-bezier(.16,1,.3,1);z-index:100;pointer-events:none;max-width:90vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast i{color:var(--accent);margin-right:8px}
.audio-status{position:fixed;top:16px;right:16px;z-index:20;display:flex;align-items:center;gap:8px;padding:8px 14px;background:rgba(14,14,14,0.8);border:1px solid rgba(212,175,55,0.15);border-radius:20px;font-size:11px;color:var(--muted);backdrop-filter:blur(10px);cursor:pointer;transition:all .3s ease}
.audio-status:hover{border-color:rgba(212,175,55,0.3)}
.audio-status .dot{width:6px;height:6px;border-radius:50%;background:#555;transition:background .3s}
.audio-status.playing .dot{background:#50c878;animation:dotPulse 1.5s ease-in-out infinite}
.audio-status.error .dot{background:#e74c3c}
@keyframes dotPulse{0%,100%{opacity:1}50%{opacity:.4}}
@media(max-width:400px){.pw-card{width:290px;padding:22px 20px}.brand{font-size:30px}.pw-char{font-size:22px}.enter-brand{font-size:34px}}
</style>
</head>
<body>

<div class="enter-overlay" id="enterOverlay">
  <div class="enter-ring"><i class="fa-solid fa-shield-halved"></i></div>
  <div class="enter-brand">LailaBelajar</div>
  <div class="enter-hint">Ketuk untuk masuk</div>
</div>

<div class="audio-status" id="audioStatus" title="Klik untuk play/pause musik">
  <span class="dot"></span>
  <span id="audioLabel">Musik</span>
</div>

<div class="bg-layer">
  <div class="glow a"></div>
  <div class="glow b"></div>
  <div class="glow c"></div>
</div>
<canvas id="particles"></canvas>
<div class="vline top"></div>
<div class="vline bottom"></div>

<!-- PERBAIKAN: preload="none" agar tidak langsung load base64 besar -->
<audio id="bgSong" loop preload="none"></audio>

<div class="container" id="mainContainer">
  <div class="icon-ring" aria-hidden="true"><i class="fa-solid fa-shield-halved"></i></div>
  <h1 class="brand">LailaBelajar</h1>
  <p class="tagline">Password yang dibagikan untuk Anda</p>
  <div class="pw-card" id="pwCard">
    <div class="pw-label">Password</div>
    <div class="pw-display" id="pwDisplay" aria-label="Password: tanyalaila"></div>
    <div class="divider"></div>
    <button class="copy-btn" id="copyBtn" type="button" aria-label="Salin password">
      <i class="fa-regular fa-copy"></i>
      <span>Salin Password</span>
    </button>
  </div>
  <p class="footer">Dibagikan dengan aman</p>
</div>

<div class="toast" id="toast"><i class="fa-solid fa-check"></i><span id="toastMsg"></span></div>

/* === Password === */
const PASSWORD = 'tanyalaila';
const pwDisplay = document.getElementById('pwDisplay');
const pwChars = [];
PASSWORD.split('').forEach((el, i) => {
  const span = document.createElement('span');
  span.className = 'pw-char';
  span.textContent = el;
  span.style.animationDelay = (i * 0.07) + 's';
  pwDisplay.appendChild(span);
  pwChars.push(span);
});

/* === Toast === */
const toastEl = document.getElementById('toast');
const toastMsg = document.getElementById('toastMsg');
let toastTimer = null;
function showToast(msg, duration = 2500) {
  toastMsg.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration);
}

/* === Copy === */
const copyBtn = document.getElementById('copyBtn');
copyBtn.addEventListener('click', () => {
  const done = () => {
    copyBtn.classList.add('copied');
    copyBtn.querySelector('i').className = 'fa-solid fa-check';
    copyBtn.querySelector('span').textContent = 'Tersalin';
    showToast('Password berhasil disalin');
    setTimeout(() => {
      copyBtn.classList.remove('copied');
      copyBtn.querySelector('i').className = 'fa-regular fa-copy';
      copyBtn.querySelector('span').textContent = 'Salin Password';
    }, 2000);
  };
  navigator.clipboard.writeText(PASSWORD).then(done).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = PASSWORD;
    ta.style.cssText = 'position:fixed;left:-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    done();
  });
});

/* ═══════════════════════════════════════
   AUDIO HANDLER — PERBAIKAN UNTUK MOBILE
   ═══════════════════════════════════════ */
const bgSong = document.getElementById('bgSong');
const audioStatus = document.getElementById('audioStatus');
const audioLabel = document.getElementById('audioLabel');
let audioReady = false;
let audioPlaying = false;
let retryCount = 0;
const MAX_RETRY = 3;

// Cek apakah base64 sudah di-paste
function initAudio() {
  if (AUDIO_BASE64 === "PASTE_BASE64_DISINI" || AUDIO_BASE64.trim() === "") {
    audioStatus.classList.add('error');
    audioLabel.textContent = 'No audio';
    console.warn('Base64 audio belum di-paste');
    return false;
  }
  
  try {
    // Gunakan srcObject via Blob untuk mobile (lebih reliabel dari data URI)
    const byteChars = atob(AUDIO_BASE64);
    const byteArray = new Uint8Array(byteChars.length);
    for (let i = 0; i < byteChars.length; i++) {
      byteArray[i] = byteChars.charCodeAt(i);
    }
    const blob = new Blob([byteArray], { type: 'audio/mpeg' });
    const blobUrl = URL.createObjectURL(blob);
    bgSong.src = blobUrl;
    bgSong.volume = 0.8;
    audioReady = true;
    console.log('Audio loaded via Blob URL, size:', (blob.size / 1024).toFixed(1) + ' KB');
    return true;
  } catch (e) {
    console.warn('Blob method gagal, coba data URI:', e);
    // Fallback ke data URI
    try {
      bgSong.src = "data:audio/mpeg;base64," + AUDIO_BASE64;
      bgSong.volume = 0.8;
      audioReady = true;
      return true;
    } catch (e2) {
      console.error('Semua metode audio gagal:', e2);
      audioStatus.classList.add('error');
      audioLabel.textContent = 'Error';
      return false;
    }
  }
}

function tryPlay() {
  if (!audioReady) return;
  
  const p = bgSong.play();
  if (p !== undefined) {
    p.then(() => {
      audioPlaying = true;
      audioStatus.classList.add('playing');
      audioStatus.classList.remove('error');
      audioLabel.textContent = 'Playing';
      retryCount = 0;
    }).catch((e) => {
      console.warn('Play gagal (attempt ' + (retryCount + 1) + '):', e.message);
      retryCount++;
      
      if (retryCount <= MAX_RETRY) {
        // Retry dengan delay — mobile butuh jeda setelah user gesture
        setTimeout(() => tryPlay(), 300 * retryCount);
      } else {
        audioStatus.classList.add('error');
        audioLabel.textContent = 'Tap to play';
        showToast('🎵 Tap ikon musik di pojok kanan atas untuk memutar lagu', 4000);
      }
    });
  }
}

function toggleAudio() {
  if (!audioReady) {
    if (!initAudio()) {
      showToast('Audio belum tersedia — pastikan base64 sudah di-paste');
      return;
    }
  }
  
  if (audioPlaying) {
    bgSong.pause();
    audioPlaying = false;
    audioStatus.classList.remove('playing');
    audioLabel.textContent = 'Paused';
  } else {
    tryPlay();
  }
}

// Klik status badge untuk toggle
audioStatus.addEventListener('click', toggleAudio);

/* === Enter / Overlay === */
const mainContainer = document.getElementById('mainContainer');
const enterOverlay = document.getElementById('enterOverlay');
let entered = false;

function enter() {
  if (entered) return;
  entered = true;
  
  // Init audio DARI dalam user gesture (penting untuk mobile!)
  initAudio();
  
  enterOverlay.classList.add('gone');
  
  setTimeout(() => {
    mainContainer.classList.add('visible');
    pwChars.forEach((el, i) => {
      setTimeout(() => el.classList.add('show'), 200 + i * 70);
    });
  }, 300);
  
  // Coba play audio setelah transisi selesai
  setTimeout(() => {
    tryPlay();
  }, 500);
  
  setTimeout(() => {
    enterOverlay.style.display = 'none';
  }, 800);
}

enterOverlay.addEventListener('click', enter);
enterOverlay.addEventListener('touchstart', (e) => {
  e.preventDefault();
  enter();
}, { passive: false });

/* === Particles === */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let w, h;
const parts = [];
const PCOUNT = 45;

function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

for (let i = 0; i < PCOUNT; i++) {
  parts.push({
    x: Math.random() * w, y: Math.random() * h,
    r: Math.random() * 1.4 + 0.3,
    vx: (Math.random() - 0.5) * 0.25,
    vy: (Math.random() - 0.5) * 0.25,
    alpha: Math.random() * 0.35 + 0.08,
    phase: Math.random() * Math.PI * 2,
    speed: Math.random() * 0.008 + 0.004
  });
}

let mx = -999, my = -999;
window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mouseleave', () => { mx = -999; my = -999; });

function frame() {
  ctx.clearRect(0, 0, w, h);
  for (let i = 0; i < parts.length; i++) {
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.phase += p.speed;
    if (p.x < -10) p.x = w + 10;
    if (p.x > w + 10) p.x = -10;
    if (p.y < -10) p.y = h + 10;
    if (p.y > h + 10) p.y = -10;
    const dx = p.x - mx, dy = p.y - my;
    const dist = Math.sqrt(dx * dx + dy * dy);
    let boost = 0;
    if (dist < 140) {
      const f = (1 - dist / 140) * 0.4;
      p.x += dx * f * 0.015; p.y += dy * f * 0.015;
      boost = (1 - dist / 140) * 0.45;
    }
    const a = Math.min(1, p.alpha + Math.sin(p.phase) * 0.12 + boost);
    const r = Math.max(0.1, p.r + Math.sin(p.phase) * 0.25);
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(212,175,55,' + a + ')';
    ctx.fill();
    if (r > 0.9) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, r * 3, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(212,175,55,' + (a * 0.08) + ')';
      ctx.fill();
    }
    for (let j = i + 1; j < parts.length; j++) {
      const q = parts[j];
      const ddx = p.x - q.x, ddy = p.y - q.y;
      const d = Math.sqrt(ddx * ddx + ddy * ddy);
      if (d < 110) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(q.x, q.y);
        ctx.strokeStyle = 'rgba(212,175,55,' + (0.035 * (1 - d / 110)) + ')';
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(frame);
}
frame();
